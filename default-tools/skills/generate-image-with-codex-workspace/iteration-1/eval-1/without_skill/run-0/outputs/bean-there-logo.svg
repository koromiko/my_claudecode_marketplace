<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <style>
      .brown { fill: #4a2c1a; }
      .cream { fill: #f4e9d8; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" class="cream"/>

  <!-- Outer ring -->
  <circle cx="400" cy="360" r="240" fill="none" stroke="#4a2c1a" stroke-width="10"/>
  <circle cx="400" cy="360" r="222" fill="none" stroke="#4a2c1a" stroke-width="3"/>

  <!-- Coffee cup -->
  <g>
    <!-- Saucer -->
    <ellipse cx="400" cy="438" rx="118" ry="20" class="brown"/>
    <!-- Cup body -->
    <path d="M 312 300
             L 488 300
             L 470 410
             Q 466 432 400 432
             Q 334 432 330 410
             Z" class="brown"/>
    <!-- Cup inner rim -->
    <ellipse cx="400" cy="300" rx="88" ry="18" fill="#f4e9d8"/>
    <ellipse cx="400" cy="300" rx="88" ry="18" fill="none" stroke="#4a2c1a" stroke-width="6"/>
    <!-- Handle -->
    <path d="M 488 318
             Q 548 322 548 360
             Q 548 398 480 392"
          fill="none" stroke="#4a2c1a" stroke-width="22" stroke-linecap="round"/>
  </g>

  <!-- Steam -->
  <g fill="none" stroke="#4a2c1a" stroke-width="9" stroke-linecap="round">
    <path d="M 372 250 Q 360 228 372 206 Q 384 184 372 162"/>
    <path d="M 428 250 Q 416 228 428 206 Q 440 184 428 162"/>
  </g>

  <!-- Brand name -->
  <text x="400" y="690" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="92" font-weight="bold" fill="#4a2c1a"
        letter-spacing="2">Bean There</text>

  <!-- Tagline -->
  <g>
    <line x1="250" y1="730" x2="330" y2="730" stroke="#4a2c1a" stroke-width="3"/>
    <text x="400" y="740" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="26" fill="#4a2c1a" letter-spacing="6">COFFEE SHOP</text>
    <line x1="470" y1="730" x2="550" y2="730" stroke="#4a2c1a" stroke-width="3"/>
  </g>
</svg>
